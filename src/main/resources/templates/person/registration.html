<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создать пользователя</title>
</head>
<body>

<h1>Новый пользователь</h1>

<form th:action="@{/person/save}" th:object="${person}" method="post">
    <label>Имя:</label>
    <input type="text" th:field="*{name}" />
    <br>

    <label>Возраст:</label>
    <input type="number" th:field="*{age}" />
    <br>

    <label>Логин:</label>
    <input type="text" th:field="*{nickName}" />
    <br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" />
    <br>

    <label>Пароль:</label>
    <input type="text" th:field="*{password}" />
    <br>

    <label>Страна:</label>
    <input type="text" th:field="*{deliveryAddressCreateRequestDTO.country}" />
    <br>

    <label>Город:</label>
    <input type="text" th:field="*{deliveryAddressCreateRequestDTO.city}" />
    <br>

    <label>Улица:</label>
    <input type="text" th:field="*{deliveryAddressCreateRequestDTO.street}" />
    <br>

    <label>Номер дома:</label>
    <input type="text" th:field="*{deliveryAddressCreateRequestDTO.houseNumber}" />
    <br>

    <label>Комментарий:</label>
    <input type="text" th:field="*{deliveryAddressCreateRequestDTO.comment}" />
    <br>

    <button type="submit">Сохранить</button>
</form>


<p th:if="${error != null}">
    Ошибка: <span th:text="${error}"></span>
</p>
</body>
</html>
