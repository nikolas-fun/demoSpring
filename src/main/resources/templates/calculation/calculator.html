<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Калькулятор</title>
</head>
<body>

<h1>Калькулятор</h1>

<form th:action="@{/calculate}" th:object="${calculation}" method="post">

    <input type="number" step="any" th:field="*{number1}" />

    <select th:field="*{operation}">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>

    <input type="number" step="any" th:field="*{number2}" />

    <button type="submit">Посчитать</button>
</form>

<p th:if="${result != null}">
    Результат: <span th:text="${result}"></span>
</p>

<p th:if="${error != null}">
    Ошибка: <span th:text="${error}"></span>
</p>

<a href="/history">История</a>

</body>
</html>
