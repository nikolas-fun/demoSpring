<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>History</title>
</head>
<body>

<h1>Calculation History</h1>

<table border="1">
    <tr>
        <th>Number 1</th>
        <th>Operation</th>
        <th>Number 2</th>
        <th>Result</th>
    </tr>

    <tr th:each="calc : ${calculations}">
        <td th:text="${calc.number1}"></td>
        <td th:text="${calc.operation}"></td>
        <td th:text="${calc.number2}"></td>
        <td th:text="${calc.result}"></td>
    </tr>
</table>

<br>
<a href="/calculator">Back to Calculator</a>

</body>
</html>
