<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Person</title>
</head>
<body>

<h1>Информация о человеке</h1>

<p>ID: <span th:text="${order.getId()}"></span></p>
<p>Имя: <span th:text="${order.getName()}"></span></p>
<p>Цена: <span th:text="${order.getPrice()}"></span></p>
<p>Уникальный код: <span th:text="${order.getUniqueCode()}"></span></p>
<p>Адрес: <span th:text="${order.getDeliveryAddress()}"></span></p>

<hr>

<div th:each="product : ${order.getProductDto()}">

    <p>
        Название товара:
        <span th:text="${product.getProductName()}"></span>
    </p>

    <p>
        Артикль:
        <span th:text="${product.getIndex()}"></span>
    </p>

    <hr>

</div>

</body>
</html>
