<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All orders</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
    <h3 class="mb-0">Orders</h3>

    <a th:href="@{/orders/form}" class="btn btn-success">
        + New Order
    </a>
</div>
<div class="container py-5">

    <h1 class="mb-4 text-center">Product list</h1>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>Имя</th>
                        <th>Цена</th>
                        <th>Уникальный код</th>
                        <th>Адрес</th>
                        <th>Удалить</th>
                        <th>Изменить</th>
                        <th>Изменить ТОЛЬКО "Название и Цену"</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="ord : ${orders}">
                        <td th:text="${ord.getName()}"></td>
                        <td th:text="${ord.getPrice()}"></td>
                        <td th:text="${ord.getUniqueCode()}"></td>
                        <td th:text="${ord.getDeliveryAddress()}"></td>

                        <td>
                            <form th:action="@{/orders/delete/{id}(id=${ord.getId()})}" method="post">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    ❌ Удалить
                                </button>
                            </form>
                        </td>
                        <td>
                            <a th:href="@{/orders/{id}/edit-form(id=${ord.getId()})}">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    Edit
                                </button>
                            </a>
                        </td>
                        <td>
                            <a th:href="@{/orders/{id}/edit-name-and-price(id=${ord.getId()})}">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    Edit2
                                </button>
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
